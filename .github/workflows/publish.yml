name: Publish Crate

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

env: 
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  check-version:
    name: Check if version exists
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version exists on crates.io
        id: check
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Checking version: $VERSION"
          
          HTTP_STATUS=$(curl -s -o /tmp/crate_info.json -w "%{http_code}" https://crates.io/api/v1/crates/grammatica)
          
          if [ "$HTTP_STATUS" = "200" ]; then
            if grep -q "\"num\":\"$VERSION\"" /tmp/crate_info.json; then
              echo "Version $VERSION already exists on crates.io"
              echo "should_publish=false" >> $GITHUB_OUTPUT
            else
              echo "Version $VERSION does not exist on crates.io"
              echo "should_publish=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Crate not found on crates.io (first publish)"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo publish
